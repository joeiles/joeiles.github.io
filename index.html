<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Superposition ebener Wellen</title>
  <style>
    :root{
      --bg:#0f172a; --panel:#111827; --text:#e5e7eb; --muted:#9ca3af;
      --accent:#38bdf8; --accent2:#a78bfa; --good:#34d399;
      --warn:#fbbf24;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,sans-serif;
      background:linear-gradient(180deg,var(--bg),#020617);
      color:var(--text);
      padding:20px
    }
    .layout{
      display:grid;
      grid-template-columns:380px 1fr;
      gap:20px;
      align-items:start
    }
    .panel{
      background:var(--panel);
      border-radius:12px;
      padding:20px;
      box-shadow:0 10px 15px rgba(0,0,0,0.3)
    }
    canvas{
      background:#020617;
      border-radius:8px;
      width:100%;
      margin-bottom:10px;
      display:block
    }
    .control{margin-bottom:14px}
    .label-row{
      display:flex;
      justify-content:space-between;
      gap:10px;
      margin-bottom:5px;
      font-size:0.92rem
    }
    .label-row span:last-child{
      color:var(--muted);
      font-variant-numeric:tabular-nums
    }
    select,input[type="range"]{
      width:100%;
      padding:8px;
      border-radius:6px;
      border:1px solid #374151;
      background:#111827;
      color:white
    }
    button{
      width:100%;
      padding:10px;
      border-radius:10px;
      border:1px solid #374151;
      background:#1e293b;
      color:white;
      cursor:pointer;
      font-weight:bold;
      margin-top:5px
    }
    button:hover{background:#334155}
    .check-row{
      display:flex;
      align-items:center;
      gap:8px;
      margin:5px 0;
      font-size:0.9rem;
      line-height:1.2
    }
    .check-row input{margin:0}
    .hidden{display:none !important}
    .small-note{
      color:var(--muted);
      font-size:0.88rem;
      margin-top:6px
    }
  </style>
</head>
<body>
<div class="layout">
  <aside class="panel">


    <button id="toggleBtn">▶ Start / ⏸ Pause</button>
    <button id="resetBtn">↺ Neustart</button>

    <h3>Einstellungen</h3>

<div class="control">
      <div class="label-row"><span>Messpunkt x</span><span id="vXpos">600</span></div>
      <input id="xPos" type="range" min="0" max="1200" step="1" value="600">
    </div>

    <div class="control">
      <label>Modus A (oberes Diagramm)</label>
      <select id="modeA">
        <option value="berg">Berg</option>
        <option value="tal">Tal</option>
        <option value="paket">Paket</option>
        <option value="kontinuierlich" selected>Kontinuierlich</option>
      </select>
    </div>

    <div class="control">
      <label>Modus B (mittleres Diagramm)</label>
      <select id="modeB">
        <option value="berg">Berg</option>
        <option value="tal">Tal</option>
        <option value="paket">Paket</option>
        <option value="kontinuierlich" selected>Kontinuierlich</option>
      </select>
    </div>

    <div class="control">
      <div class="label-row"><span>Amplitude A</span><span id="vAamp">1,0 cm</span></div>
      <input id="aAmp" type="range" min="0" max="2.5" step="0.1" value="1">
    </div>

    <div class="control">
      <div class="label-row"><span>Amplitude B</span><span id="vBamp">1,0 cm</span></div>
      <input id="bAmp" type="range" min="0" max="2.5" step="0.1" value="1">
    </div>

    <div class="control" id="aLamC">
      <div class="label-row"><span>Wellenlänge A</span><span id="vAlam">100 cm</span></div>
      <input id="aLam" type="range" min="40" max="260" step="1" value="100">
    </div>

    <div class="control" id="bLamC">
      <div class="label-row"><span>Wellenlänge B</span><span id="vBlam">100 cm</span></div>
      <input id="bLam" type="range" min="40" max="260" step="1" value="100">
    </div>

  
    <div class="control">
      <div class="label-row"><span>Geschwindigkeit A</span><span id="vAspeed">5 cm/s</span></div>
      <input id="speedA" type="range" min="0" max="30" step="0.5" value="5">
    </div>

    <div class="control">
      <div class="label-row"><span>Geschwindigkeit B</span><span id="vBspeed">5 cm/s</span></div>
      <input id="speedB" type="range" min="0" max="30" step="0.5" value="5">
    </div>


    <div class="control">
      <label>Ausbreitungsrichtung A</label>
      <select id="dirA">
        <option value="1" selected>links nach rechts</option>
        <option value="-1">rechts nach links</option>
      </select>
    </div>

    <div class="control">
      <label>Ausbreitungsrichtung B</label>
      <select id="dirB">
        <option value="-1" selected>rechts nach links</option>
        <option value="1">links nach rechts</option>
      </select>
    </div>

 <div class="control" id="phaseC">
      <div class="label-row"><span>Phasenverschiebung B</span><span id="vPhase">0,00 π</span></div>
      <input id="phase" type="range" min="0" max="6.283185307" step="0.01" value="0">
      <div class="small-note">Nur bei kontinuierlichen Wellen, gleicher Wellenlänge und gleicher Ausbreitungsgeschwindigkeit sichtbar.</div>
    </div>

    

    <div style="margin-top:15px">
        <label class="check-row"><input type="checkbox" id="showPeaks" checked> Darstellung als Perlenkette</label>
        <label class="check-row"><input type="checkbox" id="showShafts" checked> Momentane Auslenkung der Teilchen</label>
         <label class="check-row"><input type="checkbox" id="showMP" checked> Messpunkt anzeigen</label>
         <label>Unteres Diagramm:</label>
      <label class="check-row"><input type="checkbox" id="showA" checked> Welle A</label>
      <label class="check-row"><input type="checkbox" id="showB" checked> Welle B</label>
      <label class="check-row"><input type="checkbox" id="showS" checked> Überlagerung</label>
      <label class="check-row"><input type="checkbox" id="showX" checked> Zusammensetzung der momentanen Auslenkung am Messpunkt</label>
      <label>Skalierung: x-Achse: 1 Kästchen entsricht 50 cm, y-Achse: 1 Kästchen entsricht 1 cm, Geschwindigkeit ist nicht skaliert </label>
      
    </div>
  </aside>

  <main>
    <canvas id="canvasA" width="1200" height="200"></canvas>
    <canvas id="canvasB" width="1200" height="200"></canvas>
    <canvas id="canvasS" width="1200" height="400"></canvas>
  </main>
</div>

<script>
(() => {
  const cA = document.getElementById('canvasA');
  const cB = document.getElementById('canvasB');
  const cS = document.getElementById('canvasS');
  const ctxA = cA.getContext('2d');
  const ctxB = cB.getContext('2d');
  const ctxS = cS.getContext('2d');

  const el = id => document.getElementById(id);
  const controls = {
    modeA: el('modeA'),
    modeB: el('modeB'),
    aAmp: el('aAmp'),
    bAmp: el('bAmp'),
    aLam: el('aLam'),
    bLam: el('bLam'),
    phase: el('phase'),
    speedA: el('speedA'),
    speedB: el('speedB'),
    dirA: el('dirA'),
    dirB: el('dirB'),
    xPos: el('xPos'),
    showA: el('showA'),
    showB: el('showB'),
    showS: el('showS'),
    showMP: el('showMP'),
    showX: el('showX'),
    showShafts: el('showShafts'),
    showPeaks: el('showPeaks')
  };

  const labels = {
    vAamp: el('vAamp'),
    vBamp: el('vBamp'),
    vAlam: el('vAlam'),
    vBlam: el('vBlam'),
    vPhase: el('vPhase'),
    vAspeed: el('vAspeed'),
    vBspeed: el('vBspeed'),
    vXpos: el('vXpos')
  };

  const phaseC = el('phaseC');
  const aLamC = el('aLamC');
  const bLamC = el('bLamC');
  const toggleBtn = el('toggleBtn');
  const resetBtn = el('resetBtn');

  let t = 0;
  let paused = true;

  const fmt1 = n => Number(n).toFixed(1).replace('.', ',');
  const fmt2 = n => Number(n).toFixed(2).replace('.', ',');

  function updateLabels() {
    labels.vAamp.textContent = `${fmt1(+controls.aAmp.value*0.6)} cm`;
    labels.vBamp.textContent = `${fmt1(+controls.bAmp.value*0.6)} cm`;
    labels.vAlam.textContent = `${Math.round(+controls.aLam.value)} cm`;
    labels.vBlam.textContent = `${Math.round(+controls.bLam.value)} cm`;
    labels.vPhase.textContent = `${fmt2((+controls.phase.value)*100 / Math.PI)} cm`;
    labels.vAspeed.textContent = `${fmt1(+controls.speedA.value)} cm/s`;
    labels.vBspeed.textContent = `${fmt1(+controls.speedB.value)} cm/s`;
    labels.vXpos.textContent = `${Math.round(+controls.xPos.value)} cm`;
  }

  function updateVisibility() {
    const continuousBoth = controls.modeA.value === 'kontinuierlich' && controls.modeB.value === 'kontinuierlich';
    const sameLambda = +controls.aLam.value === +controls.bLam.value;
    phaseC.classList.toggle('hidden', !(continuousBoth && sameLambda));
    aLamC.classList.toggle('hidden', controls.modeA.value !== 'kontinuierlich');
    bLamC.classList.toggle('hidden', controls.modeB.value !== 'kontinuierlich');
  }

  function drawGrid(ctx, w, h) {
    ctx.save();
    ctx.strokeStyle = '#1e293b';
    ctx.lineWidth = 1;

    for (let x = 0; x <= w; x += 50) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, h);
      ctx.stroke();
    }
    for (let y = 0; y <= h; y += 50) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(w, y);
      ctx.stroke();
    }

    ctx.strokeStyle = '#475569';
    ctx.beginPath();
    ctx.moveTo(0, h / 2);
    ctx.lineTo(w, h / 2);
    ctx.stroke();

    ctx.restore();
  }

  function drawArrowHead(ctx, x, y, up, color) {
    const s = 6;
    ctx.fillStyle = color;
    ctx.beginPath();
    if (up) {
      ctx.moveTo(x, y);
      ctx.lineTo(x - s, y + 8);
      ctx.lineTo(x + s, y + 8);
    } else {
      ctx.moveTo(x, y);
      ctx.lineTo(x - s, y - 8);
      ctx.lineTo(x + s, y - 8);
    }
    ctx.closePath();
    ctx.fill();
  }

  function drawArrow(ctx, x, y0, val, color, scale) {
    if (Math.abs(val) < 0.02) return;
    const y1 = y0 - val * scale;
    ctx.save();
    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(x, y0);
    ctx.lineTo(x, y1);
    ctx.stroke();
    drawArrowHead(ctx, x, y1, val > 0, color);
    ctx.restore();
  }

  function drawMarker(ctx, x, y, color) {
    ctx.save();
    ctx.fillStyle = '#020617';
    ctx.strokeStyle = color;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(x, y, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y, 13, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  function drawWaveLine(ctx, arr, color, h) {
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    arr.forEach((y, x) => {
      const py = h / 2 - y * 30;
      x === 0 ? ctx.moveTo(x, py) : ctx.lineTo(x, py);
    });
    ctx.stroke();
    ctx.restore();
  }

  function drawPearlWave(ctx, arr, color, h) {
    const spacing = 20; // 2 Kästchen = 1 cm
    ctx.save();
    ctx.strokeStyle = color + '88';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let x = 0; x < arr.length; x += spacing) {
      const py = h / 2 - arr[x] * 30;
      if (x === 0) ctx.moveTo(x, py);
      else ctx.lineTo(x, py);
    }
    ctx.stroke();

    ctx.fillStyle = color;
    for (let x = 0; x < arr.length; x += spacing) {
      const py = h / 2 - arr[x] * 30;
      ctx.beginPath();
      ctx.arc(x, py, 5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawWave(ctx, arr, color, h) {
    if (controls.showPeaks.checked) drawPearlWave(ctx, arr, color, h);
    else drawWaveLine(ctx, arr, color, h);
  }

  function waveFor(mode, x, A, lam, time, dir, v, ph) {
    if (mode === 'kontinuierlich') {
      return A * Math.sin((2 * Math.PI / lam) * (x - dir * v * time) + ph);
    }

    const travel = (time * v * 10) % 1200;
    const c = dir === 1 ? travel : 1200 - travel;

    if (mode === 'berg') return A * Math.exp(-Math.pow((x - c) / 50, 2));
    if (mode === 'tal') return -A * Math.exp(-Math.pow((x - c) / 50, 2));

    if (mode === 'paket') {
      const offsets = [-80, -40, 0, 40, 80];
      const amps = [0.25, 0.6, 1.0, 0.6, 0.25];
      let y = 0;
      for (let i = 0; i < offsets.length; i++) {
        const cx = c + offsets[i];
        const sgn = (i % 2 === 0) ? 1 : -1;
        y += amps[i] * sgn * Math.exp(-Math.pow((x - cx) / 15, 2));
      }
      return A * y;
    }

    return 0;
  }

  function drawTopParticleArrows(ctx, yArr, h, color, dir) {
    if (!controls.showShafts.checked) return;
    const spacing = 20; // regelmäßige Pfeile
    for (let x = 0; x < yArr.length; x += spacing) {
      const y0 = h / 2;
      const dy = yArr[x] * 30;
      if (Math.abs(dy) < 1.2) continue;
      drawArrow(ctx, x, y0, yArr[x], color, 30);
    }
  }

  function drawXArrowBundle(ctx, x0, yA, yB, yS) {
    if (!controls.showX.checked) return;

    const centerY = 200;
    const off = 8;

    drawArrow(ctx, x0 - off, centerY, yA, '#FFCC33', 30);
    drawArrow(ctx, x0 + off, centerY, yB, '#0000FF', 30);
    if (controls.showS.checked) drawArrow(ctx, x0 + off * 3, centerY, yS, '#00CC00', 30);
  }

  function render() {
    const w = 1200;
    const hA = 200;
    const hB = 200;
    const hS = 400;
    const x0 = Math.max(0, Math.min(w - 1, Math.round(+controls.xPos.value)));

    updateLabels();
    updateVisibility();

    ctxA.clearRect(0, 0, w, hA);
    ctxB.clearRect(0, 0, w, hB);
    ctxS.clearRect(0, 0, w, hS);

    drawGrid(ctxA, w, hA);
    drawGrid(ctxB, w, hB);
    drawGrid(ctxS, w, hS);

    const A = +controls.aAmp.value;
    const B = +controls.bAmp.value;
    const La = +controls.aLam.value;
    const Lb = +controls.bLam.value;
    const ph = +controls.phase.value;
    const vA = +controls.speedA.value;
    const vB = +controls.speedB.value;
    const dirA = +controls.dirA.value;
    const dirB = +controls.dirB.value;

    const yA = [];
    const yB = [];
    const yS = [];

    for (let x = 0; x < w; x++) {
      const va = waveFor(controls.modeA.value, x, A, La, t, dirA, vA, 0);
      const vb = waveFor(controls.modeB.value, x, B, Lb, t, dirB, vB, ph);
      yA.push(va);
      yB.push(vb);
      yS.push(va + vb);
    }

    // obere Diagramme
    drawWave(ctxA, yA, '#FFCC33', hA);
    drawWave(ctxB, yB, '#0000FF', hB);

    // Pfeile für Teilchen in den oberen Diagrammen
    drawTopParticleArrows(ctxA, yA, hA, '#FFCC33', dirA);
    drawTopParticleArrows(ctxB, yB, hB, '#0000FF', dirB);

    // unteres Diagramm
    if (controls.showA.checked) drawWave(ctxS, yA, '#FFCC33', hS);
    if (controls.showB.checked) drawWave(ctxS, yB, '#0000FF', hS);
    if (controls.showS.checked) drawWave(ctxS, yS, '#00CC00', hS);

    // Messpunkt in allen Diagrammen
    if (controls.showMP.checked) {
      const pyA = hA / 2 - yA[x0] * 30;
      const pyB = hB / 2 - yB[x0] * 30;
      const pyS = hS / 2 - yS[x0] * 30;

      drawMarker(ctxA, x0, pyA, '#FFCC33');
      drawMarker(ctxB, x0, pyB, '#0000FF');
      drawMarker(ctxS, x0, pyS, '#00CC00');

      if (controls.showX.checked) {
        drawArrow(ctxS, x0 , hS / 2, yA[x0], '#FFCC33', 30);
        drawArrow(ctxS, x0 , hS / 2, yB[x0], '#0000FF', 30);
      }
    }

    // Phasenregler nur wenn beide kontinuierlich + gleiche Wellenlänge
    const continuousBoth = controls.modeA.value === 'kontinuierlich' && controls.modeB.value === 'kontinuierlich';
    const sameLambda = +controls.aLam.value === +controls.bLam.value;
    const sameAusbreitungsgeschwindigkeit = +controls.speedA.value === +controls.speedB.value;
    phaseC.classList.toggle('hidden', !(continuousBoth && sameLambda && sameAusbreitungsgeschwindigkeit));

    if (!paused) t += 0.05;
    requestAnimationFrame(render);
  }

  toggleBtn.onclick = () => {
    paused = !paused;
    toggleBtn.textContent = paused ? '▶ Start / ⏸ Pause' : '⏸ Pause / ▶ Start';
  };

  resetBtn.onclick = () => {
    t = 0;
  };

  // Events
  Object.values(controls).forEach(ctrl => {
    ctrl.addEventListener('input', () => {
      updateLabels();
      updateVisibility();
    });
  });

  updateLabels();
  updateVisibility();
  render();
})();
</script>
</body>
</html>
